terraform:
  prs:
    method: GET
    path: /api/terraform-ops/infra-prs
    description: List infrastructure PRs
  pr:
    method: GET
    path: /api/terraform-ops/pr/{number}
    description: Get PR details with plan/apply comments
    args:
      - name: number
        position: 1
  merge:
    method: POST
    path: /api/terraform-ops/pr/{number}/merge
    description: Merge an infrastructure PR
    args:
      - name: number
        position: 1
  applies:
    method: GET
    path: /api/terraform-ops/recent-applies
    description: List recently applied PRs
  output:
    method: GET
    path: /api/terraform-output/output
    description: Get terraform outputs for an entity
    params:
      - name: entity-ref
        query: entityRef
        required: true
        description: "Entity reference (e.g. resource:default/tenant-tc3-dev-1)"
      - name: refresh
        query: refresh
        description: Force refresh cached data
  tfvars:
    method: GET
    path: /api/terraform-output/tfvars
    description: Get terraform.tfvars for an entity
    params:
      - name: entity-ref
        query: entityRef
        required: true

lambda:
  status:
    method: GET
    path: /api/lambda-deployments/shared-status
    description: Lambda deployment status across shared accounts
  client-status:
    method: GET
    path: /api/lambda-deployments/client-status
    description: Lambda deployment status for a client account
    params:
      - name: account-id
        query: accountId
        required: true
  groups:
    method: GET
    path: /api/lambda-deployments/service-groups
    description: List service group configuration

costs:
  get:
    method: GET
    path: /api/aws-costs/costs
    description: Get AWS account billing costs by service
    params:
      - name: account-id
        query: accountId
        required: true
        description: AWS account ID
